<style>
:root{--ok:#1a7f37;--err:#cf222e;--warn:#9a6700;--bg:#f6f8fa;--card:#fff;--accent:#0969da}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;max-width:1800px;margin:0 auto;padding:16px;background:var(--bg);color:#1f2328;line-height:1.4}
header{background:var(--card);border:1px solid #d0d7de;border-radius:12px;padding:20px;margin-bottom:16px}
h1{font-size:1.6rem;margin-bottom:4px}
.subtitle{color:#656d76;font-size:.9rem;margin-bottom:12px}
.stats{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.stat{background:#f6f8fa;border:1px solid #d0d7de;border-radius:8px;padding:10px 16px;text-align:center;min-width:110px}
.stat .num{font-size:1.8rem;font-weight:700;display:block}
.stat .label{font-size:.75rem;color:#656d76;text-transform:uppercase;letter-spacing:.5px}
.stat.ok .num{color:var(--ok)}
.stat.err .num{color:var(--err)}
.controls{background:var(--card);border:1px solid #d0d7de;border-radius:12px;padding:14px;margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.controls input,.controls select,.controls button{padding:7px 10px;border:1px solid #d0d7de;border-radius:6px;font-size:.85rem}
.controls input{flex:1;min-width:180px}
.controls button{background:var(--accent);color:#fff;border-color:var(--accent);cursor:pointer;font-weight:600}
.controls button:hover{background:#0860ca}
.controls .toggle-btn{background:#f6f8fa!important;color:#1f2328!important;border-color:#d0d7de!important}
.controls .toggle-btn.active{background:#ddf4ff!important;border-color:#54aeff!important;color:#0969da!important}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:10px}
.card{background:var(--card);border:1px solid #d0d7de;border-radius:10px;padding:12px;display:flex;align-items:center;gap:10px;text-decoration:none;color:inherit;transition:box-shadow .15s;position:relative}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);border-color:#54aeff}
.card .num{position:absolute;top:4px;right:8px;font-size:.65rem;color:#8b949e;font-family:monospace}
.card img{width:44px;height:44px;object-fit:contain;flex-shrink:0;border-radius:6px;background:#fff;border:1px solid #eee;padding:3px}
.card .info{flex:1;min-width:0}
.card .name{font-size:.85rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .domain{font-size:.7rem;color:#656d76;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .states{font-size:.62rem;color:#656d76;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px}
.card .cats{font-size:.6rem;color:#8b949e;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .badge{font-size:.6rem;padding:2px 5px;border-radius:8px;font-weight:600;flex-shrink:0}
.card .badge.svg{background:#ddf4ff;color:#0969da}
.card .badge.png{background:#dafbe1;color:#1a7f37}
.card .badge.ico{background:#fff8c5;color:#9a6700}
.card .badge.jpg{background:#ffebe9;color:#cf222e}
.card .badge.webp{background:#fbefff;color:#8250df}
.card .badge.gif{background:#eaeef2;color:#656d76}
.card .badge.intl{background:#fff8c5;color:#9a6700}
.card.missing{border-color:#ffc107;background:#fffbf0}
.card .badge.missing{background:#fff8c5;color:#9a6700}
.card .ext-link{font-size:.65rem;color:var(--accent);text-decoration:none;flex-shrink:0;opacity:0;transition:opacity .2s}
.card:hover .ext-link{opacity:1}
.card .sha{font-size:.55rem;font-family:monospace;color:#8b949e;word-break:break-all;display:none;margin-top:2px}
.card.show-sha .sha{display:block}
footer{margin-top:32px;padding:16px;background:var(--card);border:1px solid #d0d7de;border-radius:12px;font-size:.8rem;color:#656d76;text-align:center}
footer a{color:var(--accent)}
.showing-count{font-size:.8rem;color:#656d76;margin-bottom:8px}
.cat-panel{display:none;margin-bottom:12px;padding:12px;background:var(--card);border:1px solid #d0d7de;border-radius:12px}
.cat-panel label{display:inline-flex;align-items:center;gap:3px;padding:4px 8px;margin:3px;background:#f6f8fa;border-radius:6px;font-size:.75rem;cursor:pointer}
.cat-panel label:hover{background:#ddf4ff}
.cat-panel.active{display:flex;flex-wrap:wrap;gap:4px}
@media(max-width:600px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
  .card img{width:36px;height:36px}
  .stats{gap:8px}
  .stat{min-width:90px;padding:8px 12px}
}
</style>
</head>

function init() {
  const grid = document.getElementById('grid');
  let cards = [];
  let verified = 0, missing = 0;
  const formats = {};

  for (let i = 0; i < books.length; i++) {
    const b = books[i];
    const entry = manifest[b.name];
    const domain = b.url.replace(/^https?:\/\//,'').replace(/^www\./,'').split('/')[0];
    const states = b.states || [];
    const cats = b.categories || [];
    const isIntl = b.is_international;
    const stateTag = isIntl ? '🌎' : (states.map(s=>stateNames[s]||s).join(', ')||'—');
    const catTags = cats.map(c=>(categoryEmojis[c]||c).split(' ')[0]).join(' ');
    const tag = isIntl ? 'International' : (states.map(s=>stateNames[s]||s).join(', ')||'');

    if (entry && entry.status === 'verified' && entry.sha256) {
      verified++;
      const ct = entry.content_type || '';
      const ext = ct.includes('svg')?'svg':ct.includes('png')?'png':ct.includes('jpeg')?'jpg':ct.includes('webp')?'webp':ct.includes('gif')?'gif':ct.includes('icon')?'ico':'bin';
      formats[ext] = (formats[ext]||0) + 1;
      cards.push({num:i+1,name:b.name,url:b.url,domain,status:'verified',entry,ext,states,isIntl,cats,catTags,stateTag,tag});
    } else {
      missing++;
      cards.push({num:i+1,name:b.name,url:b.url,domain,status:'missing',ext:'missing',states,isIntl,cats,catTags,stateTag,tag});
    }
  }

  cards.sort((a,b)=>{if(a.status!==b.status)return a.status==='verified'?-1:1;return a.name.localeCompare(b.name)});

  // Category checkboxes
  const allCats = new Set();
  books.forEach(b=>(b.categories||[]).forEach(c=>allCats.add(c)));
  const catBox = document.getElementById('categoryCheckboxes');
  Array.from(allCats).sort().forEach(cat=>{
    const lbl = document.createElement('label');
    lbl.innerHTML = '<input type="checkbox" value="'+cat+'"> '+(categoryEmojis[cat]||cat);
    catBox.appendChild(lbl);
  });

  document.getElementById('catToggle').addEventListener('click',function(){
    this.classList.toggle('active');
    document.getElementById('categoryPanel').classList.toggle('active');
  });

  function getSelected(){return Array.from(document.querySelectorAll('#categoryCheckboxes input:checked')).map(c=>c.value)}

  function renderCards() {
    const search = document.getElementById('searchInput').value.toLowerCase();

      if (search && !c.name.toLowerCase().includes(search) && !c.domain.toLowerCase().includes(search)) continue;
      if (c.status==='defunct') continue;
      if (filter==='verified' && c.status!=='verified') continue;
      if (filter==='missing' && c.status!=='missing') continue;
      if (format!=='all' && c.ext!==format) continue;
      if (stateF!=='all') {
        if (stateF==='international'){if(!c.isIntl)continue}
        else{if(!c.states.includes(stateF)&&!c.isIntl)continue}
      }
      if (selCats.length>0 && !selCats.some(sc=>c.cats.includes(sc))) continue;

      const div = document.createElement('div');
      div.className = 'card' + (c.status==='missing'?' missing':'');
      if (showSha) div.classList.add('sha');
      let h = '<span class="num">'+c.num+'</span>';
      if (c.status==='verified') {
        h += '<img src="'+c.entry.source_url+'" alt="" loading="lazy" onerror="this.style.display=\'none\'">';
        h += '<div class="info"><div class="name" title="'+c.name+'">'+c.name+'</div>';
        h += '<div class="domain">'+c.domain+' · '+fmtBytes(c.entry.size)+'</div>';
        h += '<div class="states" title="'+c.stateTag+'">'+c.stateTag+'</div>';
        if (c.catTags) h += '<div class="cats" title="'+c.catTags+'">'+c.catTags+'</div>';
        h += '<div class="sha">'+c.entry.sha256.substring(0,16)+'…</div></div>';
        h += '<span class="badge '+c.ext+'">'+c.ext.toUpperCase()+'</span>';
        h += '<a class="ext-link" href="'+c.url+'" target="_blank" rel="noopener">�</a>';
      } else {
        h += '<div class="info"><div class="name">'+c.name+'</div>';
        h += '<div class="domain">'+c.domain+' · no logo yet</div>';
        h += '<div class="states">'+c.stateTag+'</div>';
        if (c.catTags) h += '<div class="cats">'+c.catTags+'</div>';
        h += '</div>';
        h += '<span class="badge missing">MISSING</span>';
        h += '<a class="ext-link" href="'+c.url+'" target="_blank" rel="noopener">�</a>';
      }
      div.innerHTML = h;
      grid.appendChild(div);
      shown++;
    }
    document.getElementById('showingCount').textContent = 'Showing '+shown+' of '+cards.length+' books';
  }

  document.getElementById('stats').innerHTML = 
    '<div class="stat ok"><span class="num">'+verified+'</span><span class="label">Verified</span></div>'+
    '<div class="stat err"><span class="num">'+missing+'</span><span class="label">Missing</span></div>'+
    '<div class="stat"><span class="num">'+cards.length+'</span><span class="label">Total Books</span></div>'+
    '<div class="stat warn"><span class="num">'+(100*verified/cards.length).toFixed(1)+'%</span><span class="label">Coverage</span></div>';
  document.getElementById('genTime').textContent = new Date().toISOString().split('T')[0];
  document.getElementById('totalBooks').textContent = cards.length;
  document.getElementById('totalVerified').textContent = verified;
  document.getElementById('coverage').textContent = (100*verified/cards.length).toFixed(1)+'%';

  ['searchInput','filterSelect','formatSelect','stateSelect'].forEach(id=>document.getElementById(id).addEventListener('change',renderCards));
  document.getElementById('searchInput').addEventListener('input',renderCards);
  document.getElementById('shaToggle').addEventListener('click',function(){this.classList.toggle('active');this.textContent=this.classList.contains('active')?'Hide SHA256':'Show SHA256';renderCards()});
  document.querySelectorAll('#categoryCheckboxes input').forEach(cb=>cb.addEventListener('change',renderCards));

  renderCards();
}
init();
</script>
</body>
</html>
